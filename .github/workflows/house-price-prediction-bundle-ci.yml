name: Bundle validation for house-price-prediction
'on':
  workflow_dispatch: null
  pull_request_target: null
defaults:
  run:
    working-directory: ./house_price_prediction/
env:
  STAGING_ARM_TENANT_ID: ${{ secrets.STAGING_AZURE_SP_TENANT_ID }}
  STAGING_ARM_CLIENT_ID: ${{ secrets.STAGING_AZURE_SP_APPLICATION_ID }}
  STAGING_ARM_CLIENT_SECRET: ${{ secrets.STAGING_AZURE_SP_CLIENT_SECRET }}
  PROD_ARM_TENANT_ID: ${{ secrets.PROD_AZURE_SP_TENANT_ID }}
  PROD_ARM_CLIENT_ID: ${{ secrets.PROD_AZURE_SP_APPLICATION_ID }}
  PROD_ARM_CLIENT_SECRET: ${{ secrets.PROD_AZURE_SP_CLIENT_SECRET }}
jobs:
  staging:
    concurrency: house-price-prediction-staging-bundle-job
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - uses: databricks/setup-cli@main
    - name: Validate Bundle For Staging Environment
      id: validate
      env:
        ARM_TENANT_ID: ${{ env.STAGING_ARM_TENANT_ID }}
        ARM_CLIENT_ID: ${{ env.STAGING_ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ env.STAGING_ARM_CLIENT_SECRET }}
      run: 'databricks bundle validate -e staging > ../validate_output.txt

        '
    - name: Create Comment with Bundle Configuration
      uses: actions/github-script@v6
      id: comment
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: "const fs = require('fs');\nconst fileContents = fs.readFileSync('validate_output.txt',\
          \ 'utf8');\nconst output = `#### Bundle Staging Config Validated \U0001F58C\
          \n<details><summary>Staging Validation Output</summary>\n\n\\`\\`\\`\\n\n\
          ${fileContents}\n\\`\\`\\`\n\n</details>`\n\ngithub.rest.issues.createComment({\n\
          \  issue_number: context.issue.number,\n  owner: context.repo.owner,\n \
          \ repo: context.repo.repo,\n  body: output\n})\n"
  prod:
    concurrency: house-price-prediction-prod-bundle-job
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - uses: databricks/setup-cli@main
    - name: Validate Bundle For Prod Environment
      id: validate
      env:
        ARM_TENANT_ID: ${{ env.PROD_ARM_TENANT_ID }}
        ARM_CLIENT_ID: ${{ env.PROD_ARM_CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ env.PROD_ARM_CLIENT_SECRET }}
      run: 'databricks bundle validate -e prod > ../validate_output.txt

        '
    - name: Create Comment with Bundle Configuration
      uses: actions/github-script@v6
      id: comment
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: "const fs = require('fs');\nconst fileContents = fs.readFileSync('validate_output.txt',\
          \ 'utf8');\nconst output = `#### Bundle Prod Config Validated \U0001F58C\
          \n<details><summary>Prod Validation Output</summary>\n\n\\`\\`\\`\\n\n${fileContents}\n\
          \\`\\`\\`\n\n</details>`\n\ngithub.rest.issues.createComment({\n  issue_number:\
          \ context.issue.number,\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n\
          \  body: output\n})\n"
